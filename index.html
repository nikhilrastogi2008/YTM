<style>

  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:6px;}

  input[type=range]{width:100%;accent-color:var(--amber);}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field2{margin-bottom:16px;}
  .field2 label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:6px;}
  .field2 input, .field2 select{width:100%;background:var(--panel-raise);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:5px;font-family:var(--font-mono);font-size:13px;}
  .obj-list{list-style:none;padding:0;margin:0;}
  .obj-list li{padding:7px 0 7px 22px;position:relative;font-size:13px;color:var(--text-dim);border-bottom:1px solid var(--border-soft);}
  .obj-list li:before{content:"▸";position:absolute;left:0;color:var(--teal);}

  .gradebox{text-align:center;padding:24px;border:1px solid var(--border);border-radius:10px;background:var(--panel-alt);margin-bottom:18px;}
  .gradebox .sub{color:var(--text-dim);font-size:13px;margin-top:8px;line-height:1.6;}

  svg text{font-family:var(--font-mono);}
  footer.note{color:var(--text-faint);font-size:10.5px;margin-top:24px;line-height:1.6;border-top:1px solid var(--border-soft);padding-top:14px;}

  .reveal-corner{position:fixed;bottom:8px;right:10px;font-size:9.5px;color:var(--text-faint);opacity:.35;display:flex;align-items:center;gap:5px;z-index:50;user-select:none;}
  .reveal-corner:hover{opacity:1;}
  .reveal-corner input{width:10px;height:10px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================== DATA ============================== */
const BOND_SEED = [
  {id:'SHORT', name:'2-Year Note', coupon:5.00, mat:2},
  {id:'MED',   name:'5-Year Note', coupon:5.00, mat:5},
  {id:'LONG',  name:'8-Year Bond', coupon:5.00, mat:8},
];
const RATE_EVENTS = [
  {d:-1.00, h:'Central bank cuts rates sharply', n:'A surprise cut as recession fears build.'},
  {d:-0.50, h:'Central bank cuts rates', n:'Policy eased to support slowing growth.'},
  {d:-0.25, h:'Rates edge down', n:'Soft economic data nudges yields lower.'},
  {d:0,     h:'Rates hold steady', n:'No major surprises from the central bank this year.'},
  {d:0.25,  h:'Rates edge up', n:'Solid jobs data nudges yields higher.'},
  {d:0.50,  h:'Central bank hikes rates', n:'Rates raised to cool inflation.'},
  {d:1.00,  h:'Central bank hikes rates sharply', n:'Aggressive tightening as inflation surges.'},
];

/* ============================== RNG ============================== */
function xmur3(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return function(){h=Math.imul(h^(h>>>16),2246822507);h=Math.imul(h^(h>>>13),3266489909);h^=h>>>16;return h>>>0;};}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuffle(arr, rng){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ============================== PRICING (annual compounding) ============================== */
function priceAtYield(coupon, remMat, yPct){
  const n = Math.max(Math.round(remMat),0);
  if(n<=0) return 1000;
  const y = yPct/100;
  const c = coupon/100*1000;
  let pv=0;
  for(let t=1;t<=n;t++) pv += c/Math.pow(1+y,t);
  pv += 1000/Math.pow(1+y,n);
  return Math.round(pv*100)/100;
}
function currentPrice(bond){ return priceAtYield(bond.coupon, bond.remMat, S.baseRate); }
const fmt = n => n.toLocaleString('en-US',{maximumFractionDigits:0});
const fmt2 = n => n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct = n => (n>=0?'+':'')+n.toFixed(2)+'%';
function annualizedReturnPct(currentVal, initialVal, years){
  const totalRet = currentVal/initialVal - 1;
  if(years<=0) return totalRet*100;
  return (Math.pow(currentVal/initialVal, 1/years)-1)*100;
}

/* ============================== GAME STATE ============================== */
let S = null;

function newGame(cfg){
  const rng = mulberry32(xmur3(cfg.seed||String(Date.now()))());
  const eventQueue = shuffle(RATE_EVENTS, rng);
  const bonds = BOND_SEED.map(b=>({...b, remMat:b.mat, matured:false, held:null}));
  S = {
    cfg, eventQueue, bonds,
    baseRate: 5.00, rateHistory:[5.00],
    round:0, totalRounds: cfg.rounds,
    cash: cfg.cash, initialCash: cfg.cash,
    ledger: [], eventLog: [],
    history:[{round:0, value:cfg.cash}],
    tradeQty:{}, screen:'game',
    labBondId:'MED', labYTM:5.00,
  };
  bonds.forEach(b=>S.tradeQty[b.id]=1);
  S.priceGuess = {};
  S.priceVerified = {};
  S.revealPrices = false;
}

function positionValue(){
  return S.bonds.reduce((s,b)=> s + (b.held? b.held.qty*currentPrice(b) : 0), 0);
}
function portfolioValue(){ return S.cash + positionValue(); }

/* Grows a coupon received at `fromRound` forward to `toRound` using the actual
   one-year market rate that prevailed in each intervening year (S.rateHistory[i]
   is the rate in effect during the year starting at round i). */
function reinvestedValue(couponEvents, toRound){
  return couponEvents.reduce((total, ev)=>{
    let factor = 1;
    for(let i=ev.round; i<toRound; i++) factor *= (1 + (S.rateHistory[i]!==undefined?S.rateHistory[i]:S.baseRate)/100);
    return total + ev.amount*factor;
  }, 0);
}

/* return calc, reused for both live "unrealized" preview and final realized ledger entries.
   Returns BOTH conventions so students can see the gap between them directly:
   - cash:       coupons held as idle cash, never reinvested (simplest to hand-check)
   - reinvested: coupons reinvested at the market rate that actually prevailed each year
                 (this is the assumption baked into YTM) */
function calcReturn(held, exitPrice, exitRound){
  const basis = held.buyPrice * held.qty;
  const capitalGain = (exitPrice - held.buyPrice) * held.qty;
  const yearsHeld = Math.max(exitRound - held.buyRound, 0);
  const couponsCash = held.couponEvents.reduce((s,e)=>s+e.amount,0);
  const couponsReinvested = reinvestedValue(held.couponEvents, exitRound);
  function build(couponsVal){
    const totalReturn = couponsVal + capitalGain;
    const hpr = basis>0 ? totalReturn/basis : 0;
    const annualized = yearsHeld>0 ? Math.pow(1+hpr, 1/yearsHeld)-1 : hpr;
    return {totalReturn, hpr, annualized};
  }
  return {
    capitalGain, yearsHeld, couponsCash, couponsReinvested,
    cash: build(couponsCash),
    reinvested: build(couponsReinvested),
  };
}

function buy(id){
  const b = S.bonds.find(x=>x.id===id);
  if(b.matured || b.held) return;
  const qty = Math.max(1, parseInt(S.tradeQty[id])||1);
  const price = currentPrice(b);
  const cost = price*qty;
  if(cost>S.cash+1e-6){ flash('Not enough cash for that purchase.'); return; }
  S.cash -= cost;
  b.held = {qty, buyPrice:price, buyYTM:S.baseRate, buyRound:S.round, couponEvents:[]};
  render();
}
function sellAll(id){
  const b = S.bonds.find(x=>x.id===id);
  if(!b.held) return;
  const price = currentPrice(b);
  const r = calcReturn(b.held, price, S.round);
  S.cash += price*b.held.qty;
  S.ledger.push({bondId:id, name:b.name, buyRound:b.held.buyRound, sellRound:S.round, qty:b.held.qty,
    buyPrice:b.held.buyPrice, buyYTM:b.held.buyYTM, sellPrice:price,
    ...r, reason:'SOLD'});
  b.held = null;
  render();
}
let flashMsg=null;
function flash(msg){ flashMsg=msg; render(); setTimeout(()=>{flashMsg=null; render();},2600); }

function toggleReveal(){ S.revealPrices = !S.revealPrices; render(); }
function checkPrice(id){
  const b = S.bonds.find(x=>x.id===id);
  const guess = parseFloat(S.priceGuess[id]);
  if(isNaN(guess)){ flash('Enter your computed price first.'); return; }
  const actual = currentPrice(b);
  if(Math.abs(guess-actual)<=0.05){
    S.priceVerified[id]=true;
  } else {
    S.priceVerified[id]=false;
    flash(`Not quite — $${guess.toFixed(2)} isn't within $0.05 of the correct price. Recheck your discounting and try again.`);
  }
  render();
}

function advanceRound(){
  const vol = S.cfg.vol;
  // 1) coupons on current holdings — recorded as a timestamped event so it can be
  //    reinvested forward correctly later, not just summed as flat cash
  const couponRound = S.round+1;
  S.bonds.forEach(b=>{
    if(b.matured || !b.held) return;
    const coupon = b.coupon/100*1000*b.held.qty;
    S.cash += coupon;
    b.held.couponEvents.push({round:couponRound, amount:coupon});
  });
  // 2) time passes
  S.bonds.forEach(b=>{ if(!b.matured) b.remMat = Math.max(0, b.remMat-1); });
  // 3) redemption at maturity (treated as an automatic realized exit)
  S.bonds.forEach(b=>{
    if(!b.matured && b.remMat<=0){
      b.matured = true;
      if(b.held){
        const r = calcReturn(b.held, 1000, S.round+1);
        S.cash += 1000*b.held.qty;
        S.ledger.push({bondId:b.id, name:b.name, buyRound:b.held.buyRound, sellRound:S.round+1, qty:b.held.qty,
          buyPrice:b.held.buyPrice, buyYTM:b.held.buyYTM, sellPrice:1000,
          ...r, reason:'MATURED'});
        b.held = null;
      }
    }
  });
  // 4) single parallel interest-rate move
  const ev = S.eventQueue[S.round % S.eventQueue.length];
  S.baseRate = Math.max(0.5, S.baseRate + ev.d*vol);
  S.rateHistory.push(S.baseRate);
  S.eventLog.unshift({round:S.round+1, h:ev.h, d:ev.n, rate:S.baseRate});

  S.round += 1;
  S.priceGuess = {}; S.priceVerified = {};
  S.history.push({round:S.round, value:portfolioValue()});
  if(S.round>=S.totalRounds) S.screen='summary';
  render();
}

/* ============================== SVG ============================== */
function priceYieldCurveSVG(coupon, remMat, markYTM){
  const W=280,H=170,pad={l:40,r:12,t:12,b:24};
  const yields=[]; for(let y=0.5;y<=12;y+=0.5) yields.push(y);
  const prices = yields.map(y=>priceAtYield(coupon,remMat,y));
  const pMin=Math.min(...prices)*0.97, pMax=Math.max(...prices)*1.03;
  const x = y => pad.l + ((y-0.5)/11.5)*(W-pad.l-pad.r);
  const yy = p => H-pad.b - ((p-pMin)/(pMax-pMin))*(H-pad.t-pad.b);
  const pts = yields.map(y=>`${x(y)},${yy(priceAtYield(coupon,remMat,y))}`).join(' ');
  const markPrice = priceAtYield(coupon,remMat,markYTM);
  const grid=[]; for(let g=Math.ceil(pMin/200)*200; g<=pMax; g+=200){ grid.push(`<line x1="${pad.l}" y1="${yy(g)}" x2="${W-pad.r}" y2="${yy(g)}" stroke="#1A1E27"/><text x="2" y="${yy(g)+3}" fill="#565D6B" font-size="8">$${g}</text>`); }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">${grid.join('')}
    <line x1="${pad.l}" y1="${yy(1000)}" x2="${W-pad.r}" y2="${yy(1000)}" stroke="#565D6B" stroke-dasharray="2 3"/>
    <polyline points="${pts}" fill="none" stroke="#2DD4BF" stroke-width="2"/>
    <circle cx="${x(markYTM)}" cy="${yy(markPrice)}" r="5" fill="#F0A93C" stroke="#0A0C10" stroke-width="1.5"/>
    <text x="${W/2}" y="${H-6}" fill="#565D6B" font-size="9" text-anchor="middle">Yield to Maturity →</text>
  </svg>`;
}
function portfolioChartSVG(){
  const W=560,H=160,pad={l:48,r:14,t:14,b:22};
  const vals = S.history.map(h=>h.value).concat([S.initialCash]);
  const yMin=Math.min(...vals)*0.98, yMax=Math.max(...vals)*1.02;
  const xr = m => pad.l + (m/S.totalRounds)*(W-pad.l-pad.r);
  const yr = v => H-pad.b - ((v-yMin)/(yMax-yMin||1))*(H-pad.t-pad.b);
  const pts = S.history.map(h=>`${xr(h.round)},${yr(h.value)}`).join(' ');
  const grid=[]; const steps=4;
  for(let i=0;i<=steps;i++){ const v=yMin+(yMax-yMin)*i/steps; grid.push(`<line x1="${pad.l}" y1="${yr(v)}" x2="${W-pad.r}" y2="${yr(v)}" stroke="#1A1E27"/><text x="2" y="${yr(v)+3}" fill="#565D6B" font-size="8.5">$${(v/1000).toFixed(0)}k</text>`); }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">${grid.join('')}
    <line x1="${pad.l}" y1="${yr(S.initialCash)}" x2="${W-pad.r}" y2="${yr(S.initialCash)}" stroke="#5B8DEF" stroke-dasharray="4 3"/>
    <polyline points="${pts}" fill="none" stroke="#F0A93C" stroke-width="2"/>
    <text x="${W-14}" y="14" fill="#F0A93C" font-size="9" text-anchor="end">● Portfolio Value</text>
    <text x="${W-14}" y="26" fill="#5B8DEF" font-size="9" text-anchor="end">- - Starting Cash (untouched)</text>
  </svg>`;
}

/* ============================== RENDER ============================== */
function render(){
  const app = document.getElementById('app');
  if(!S || S.screen==='start'){ app.innerHTML = startScreen(); return; }
  if(S.screen==='summary'){ app.innerHTML = summaryScreen(); return; }
  app.innerHTML = gameScreen();
}

function startScreen(){
  return `
  <div class="center-wrap">
    <div class="brand" style="margin-bottom:6px;"><span class="dot"></span><h1>BOND LAB</h1></div>
    <div class="sub" style="color:var(--text-faint);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:26px;">Pricing · Trading · Yield to Maturity · Holding Period Return</div>

    <div class="panel">
      <h2>What You'll Practice</h2>
      <ul class="obj-list">
        <li>How a bond's price is built from discounted cash flows — and why price and yield move oppositely</li>
        <li>What Yield to Maturity (YTM) actually promises, and to whom</li>
        <li>Buying and selling bonds as market interest rates move</li>
        <li>The difference between an <b style="color:var(--text)">unrealized</b> gain (on paper, while holding) and a <b style="color:var(--text)">realized</b> gain (locked in by selling or maturity)</li>
        <li>Computing Holding Period Return and annualizing it — and why realized returns don't always match the YTM you bought at</li>
      </ul>
    </div>

    <div class="panel">
      <h2>Session Setup</h2>
      <div class="row2">
        <div class="field2"><label>Starting Cash (USD)</label><input id="cfgCash" type="text" value="1,000"></div>
        <div class="field2"><label>Rounds (1 round = 1 year)</label>
          <select id="cfgRounds"><option value="6">6 years</option><option value="8" selected>8 years</option><option value="10">10 years</option></select>
        </div>
      </div>
      <div class="row2">
        <div class="field2"><label>Rate Volatility</label>
          <select id="cfgVol"><option value="0.6">Calm</option><option value="1.0" selected>Normal</option><option value="1.6">Volatile</option></select>
        </div>
        <div class="field2"><label>Class Seed (optional — same seed = same rate path for everyone)</label><input id="cfgSeed" type="text" placeholder="e.g. FIN-101"></div>
      </div>
      <button class="btn primary" onclick="startGame()">Start →</button>
    </div>

    <div class="panel">
      <h2>The Three Bonds</h2>
      <p class="desc">All three start with a 5.00% coupon and price at exactly $1,000 (par) because the starting market rate is also 5.00%. They differ only in maturity — so any price gap that opens up later is purely about time-to-maturity, not credit risk.</p>
      <table><thead><tr><th>Bond</th><th>Coupon</th><th>Maturity</th></tr></thead>
        <tbody>${BOND_SEED.map(b=>`<tr><td>${b.name}</td><td class="mono">${b.coupon.toFixed(2)}%</td><td class="mono">${b.mat} years</td></tr>`).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

function tickerHTML(){
  const items = S.bonds.map(b=>{
    const price = b.matured ? 1000 : currentPrice(b);
    const label = b.matured ? 'MATURED' : `$${fmt2(price)}`;
    return `<span class="tick-item"><b>${b.name}</b><span class="mono">${label}</span></span>`;
  }).join('');
  return `<div class="ticker-wrap"><div class="ticker">${items}${items}</div></div>`;
}

function labPanel(){
  const b = BOND_SEED.find(x=>x.id===S.labBondId);
  const remMat = b.mat; // lab always shows the bond at full original maturity for clean teaching
  const price = priceAtYield(b.coupon, remMat, S.labYTM);
  const n = remMat;
  let rows='';
  for(let t=1;t<=n;t++){
    const cf = t<n ? b.coupon/100*1000 : b.coupon/100*1000+1000;
    const df = 1/Math.pow(1+S.labYTM/100,t);
    rows += `<tr><td class="mono">${t}</td><td class="mono">$${fmt(cf)}</td><td class="mono">${df.toFixed(4)}</td><td class="mono">$${fmt2(cf*df)}</td></tr>`;
  }
  return `
  <div class="panel">
    <h2>📐 Bond Pricing Explorer <span class="helper">— a sandbox, separate from the trading rounds below</span></h2>
    <p class="desc">Pick a bond and drag the yield slider. Watch the price update instantly — and see exactly which discounted cash flows produce that price.</p>
    <div class="lab-grid">
      <div>
        <div class="field">
          <label>Bond</label>
          <select onchange="S.labBondId=this.value;render()">
            ${BOND_SEED.map(x=>`<option value="${x.id}" ${x.id===S.labBondId?'selected':''}>${x.name} (${x.coupon.toFixed(2)}% coupon, ${x.mat}y)</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Assumed Yield to Maturity: <span class="mono" style="color:var(--amber)">${S.labYTM.toFixed(2)}%</span></label>
          <input type="range" min="0.5" max="12" step="0.25" value="${S.labYTM}" oninput="S.labYTM=parseFloat(this.value);render()">
        </div>
        <div class="bigprice"><span class="cap">Price</span>$${fmt2(price)}</div>
        <div class="helper" style="text-align:center;">
          ${price>1000? 'Trading at a <b style="color:var(--teal)">premium</b> — coupon exceeds YTM' : price<1000 ? 'Trading at a <b style="color:var(--red)">discount</b> — coupon is below YTM' : 'Trading exactly at <b style="color:var(--text)">par</b> — coupon equals YTM'}
        </div>
        ${priceYieldCurveSVG(b.coupon, remMat, S.labYTM)}
      </div>
      <div>
        <table><thead><tr><th>Year</th><th>Cash Flow</th><th>Discount Factor</th><th>Present Value</th></tr></thead>
          <tbody>${rows}
          <tr style="border-top:2px solid var(--border)"><td colspan="3" style="text-align:right;font-weight:600;">Price = Σ PV of cash flows</td><td class="mono" style="font-weight:700;color:var(--amber)">$${fmt2(price)}</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function bondRow(b){
  const price = currentPrice(b);
  if(b.matured){
    return `<tr class="matured"><td><div class="bname">${b.name}</div><div class="bsub">${b.coupon.toFixed(2)}% coupon</div></td>
      <td class="mono">—</td><td class="mono">—</td><td>—</td><td colspan="2"><span class="helper">MATURED — redeemed at par</span></td></tr>`;
  }
  const known = S.revealPrices || !!S.priceVerified[b.id];

  const priceCell = known
    ? `<div class="price">$${fmt2(price)}</div><div class="helper up">✓ verified</div>`
    : `<input class="qtyin" style="width:76px" type="text" inputmode="decimal" placeholder="Your $" value="${S.priceGuess[b.id]||''}" oninput="S.priceGuess['${b.id}']=this.value">
       <button class="btn" onclick="checkPrice('${b.id}')">Check</button>`;

  let posCell;
  if(b.held){
    posCell = `<div class="mono" style="font-weight:600">${b.held.qty} @ $${fmt2(b.held.buyPrice)}</div>
      <div class="helper">bought Yr ${b.held.buyRound} · YTM ${b.held.buyYTM.toFixed(2)}%</div>`;
    if(known){
      const live = calcReturn(b.held, price, S.round);
      posCell += `<div class="helper ${live.cash.annualized>=0?'up':'down'}">Unrealized (cash): ${pct(live.cash.annualized*100)} ann. if sold now</div>
      <div class="helper ${live.reinvested.annualized>=0?'up':'down'}">Unrealized (reinvested): ${pct(live.reinvested.annualized*100)} ann.</div>`;
    } else {
      posCell += `<div class="helper">Compute this year's price to see your live return</div>`;
    }
  } else {
    posCell = `<span class="helper">No position</span>`;
  }

  let actionCell;
  if(b.held){
    actionCell = known
      ? `<button class="btn sell" onclick="sellAll('${b.id}')">Sell All</button>`
      : `<button class="btn sell" disabled>Sell All</button><div class="helper">Verify price first</div>`;
  } else {
    actionCell = known
      ? `<input class="qtyin" type="number" min="1" value="${S.tradeQty[b.id]}" oninput="S.tradeQty['${b.id}']=this.value">
         <button class="btn buy" onclick="buy('${b.id}')">Buy</button>`
      : `<input class="qtyin" type="number" min="1" value="${S.tradeQty[b.id]}" oninput="S.tradeQty['${b.id}']=this.value">
         <button class="btn buy" disabled>Buy</button><div class="helper">Verify price first</div>`;
  }

  return `<tr>
    <td><div class="bname">${b.name}</div><div class="bsub">${b.coupon.toFixed(2)}% coupon · ${b.remMat}y left</div></td>
    <td class="mono">${S.baseRate.toFixed(2)}%</td>
    <td>${priceCell}</td>
    <td>${posCell}</td>
    <td>${actionCell}</td>
  </tr>`;
}

function ledgerRows(){
  if(S.ledger.length===0) return `<tr><td colspan="10" class="helper">No closed positions yet — sell a bond, or hold one to maturity, to see its full return breakdown here.</td></tr>`;
  return S.ledger.slice().reverse().map(l=>`
    <tr>
      <td>${l.name}<div class="helper">${l.reason}</div></td>
      <td class="mono">Yr ${l.buyRound} → Yr ${l.sellRound}<div class="helper">${l.yearsHeld}y held</div></td>
      <td class="mono">$${fmt2(l.buyPrice)}</td>
      <td class="mono">${l.buyYTM.toFixed(2)}%</td>
      <td class="mono">$${fmt2(l.sellPrice)}</td>
      <td class="mono">$${fmt(l.capitalGain)}</td>
      <td class="mono">$${fmt(l.couponsCash)}</td>
      <td class="mono ${l.cash.annualized>=0?'up':'down'}">${pct(l.cash.annualized*100)}</td>
      <td class="mono">$${fmt(l.couponsReinvested)}</td>
      <td class="mono ${l.reinvested.annualized>=0?'up':'down'}">${pct(l.reinvested.annualized*100)}</td>
    </tr>`).join('');
}

function glossaryPanel(){
  return `<div class="panel"><h2>Glossary</h2>
    <div class="glossary">
      <div class="gterm"><b>Yield to Maturity (YTM)</b><span>The return promised at purchase, if held to maturity and every coupon is reinvested at that same rate.</span></div>
      <div class="gterm"><b>Holding Period Return (HPR)</b><span>(Coupon income + price change) ÷ purchase price, over whatever period you held it — then converted to an annualized rate so positions of different lengths are comparable. Shown two ways: coupons as idle cash, or coupons reinvested at the prevailing rate.</span></div>
      <div class="gterm"><b>Unrealized Return</b><span>A paper gain or loss on a position you still hold — it can still change before you sell.</span></div>
      <div class="gterm"><b>Realized Return</b><span>Locked in the moment you sell or the bond matures — it can no longer change.</span></div>
    </div>
  </div>`;
}

function gameScreen(){
  const val = portfolioValue();
  const ret = annualizedReturnPct(val, S.initialCash, S.round);
  const lastEvent = S.eventLog[0];
  return `
  ${tickerHTML()}
  <div class="topbar">
    <div class="brand"><span class="dot"></span><h1>BOND LAB</h1><span class="sub">Year ${S.round} / ${S.totalRounds}</span></div>
    <div class="stats">
      <div class="stat"><div class="lbl">Market Rate</div><div class="val">${S.baseRate.toFixed(2)}%</div></div>
      <div class="stat"><div class="lbl">Cash</div><div class="val">$${fmt(S.cash)}</div></div>
      <div class="stat"><div class="lbl">Portfolio Value</div><div class="val">$${fmt(val)}</div></div>
      <div class="stat"><div class="lbl">Return (Annualized)</div><div class="val ${ret>=0?'up':'down'}">${pct(ret)}</div></div>
    </div>
  </div>

  ${flashMsg? `<div class="eventcard" style="border-color:var(--red);"><span style="color:var(--red)">${flashMsg}</span></div>` : ''}

  ${labPanel()}

  <div class="grid2">
    <div class="panel">
      <h2>💼 Trade</h2>
      <p class="desc">Buy at the current market price. You can only hold one open lot per bond at a time — sell it fully before buying again. This keeps every trade's return easy to check by hand.</p>
      <p class="desc" style="margin-top:-6px;">Every bond's price is hidden until you compute it: Price = Σ Coupon ÷ (1+YTM)ⁿ + Face ÷ (1+YTM)ⁿ, using the coupon, YTM, and years-left shown in each row. Enter your answer and hit Check — you're within tolerance at ±$0.05. Trading unlocks once you're verified, and re-locks every time a new year begins.</p>
      <table><thead><tr><th>Bond</th><th>Market YTM</th><th>Price</th><th>Your Position</th><th>Trade</th></tr></thead>
        <tbody>${S.bonds.map(bondRow).join('')}</tbody>
      </table>
    </div>
    <div class="panel">
      <h2>📈 Market</h2>
      ${lastEvent ? `<div class="eventcard"><div class="q">Year ${lastEvent.round}</div><div class="h">${lastEvent.h}</div><div class="d">${lastEvent.d} New market rate: ${lastEvent.rate.toFixed(2)}%</div></div>` : `<p class="desc">Rates start at 5.00%. Advance a year to see the first move.</p>`}
      <button class="btn primary" onclick="advanceRound()">${S.round>=S.totalRounds-1? 'Advance to Final Year & View Results →' : 'Advance to Next Year →'}</button>
    </div>
  </div>

  <div class="panel">
    <h2>🧾 Realized Return Ledger <span class="helper">— positions you've actually sold or that matured</span></h2>
    <p class="desc">Two return columns, side by side, on purpose: <b style="color:var(--text)">Cash</b> assumes each coupon just sits as cash until you sell. <b style="color:var(--text)">Reinvested</b> assumes each coupon is immediately reinvested at whatever the market rate was that year — the assumption baked into YTM. If rates never moved and you held to maturity, the Reinvested annualized return will land on your purchase YTM; the Cash version usually won't. That gap is real, not a rounding error.</p>
    <div style="overflow-x:auto;">
    <table><thead><tr><th>Bond</th><th>Held</th><th>Buy Price</th><th>Buy YTM</th><th>Exit Price</th><th>Capital Gain</th><th>Coupons (cash)</th><th>HPR Annualized (cash)</th><th>Coupons (reinvested)</th><th>HPR Annualized (reinvested)</th></tr></thead>
      <tbody>${ledgerRows()}</tbody>
    </table>
    </div>
  </div>

  <div class="panel">
    <h2>Portfolio Value</h2>
    ${portfolioChartSVG()}
  </div>

  ${glossaryPanel()}

  <footer class="note">
    Simplifications for teaching: annual coupons and annual compounding (the classic textbook convention) · no bid/ask spread, trades execute at the fair price shown ·
    only one open lot per bond at a time, so every trade's return can be checked by hand · all three bonds share one market interest rate (no credit spread) so any price difference is purely a maturity effect ·
    the ledger's "reinvested" column compounds each coupon forward at the market rate actually observed in each subsequent year, so it will only exactly match your purchase YTM if rates never moved after you bought.
  </footer>

  <label class="reveal-corner">
    <input type="checkbox" ${S.revealPrices?'checked':''} onchange="toggleReveal()">
    <span>show prices</span>
  </label>
  `;
}

function summaryScreen(){
  const val = portfolioValue();
  const ret = annualizedReturnPct(val, S.initialCash, S.totalRounds);
  const closedCount = S.ledger.length;
  const avgGapVsYTM = closedCount>0
    ? S.ledger.reduce((s,l)=> s + (l.reinvested.annualized*100 - l.buyYTM), 0)/closedCount
    : null;

  let grade='B', gradeNote='A reasonable session — review the ledger below with your class.';
  if(ret>6.5){grade='A'; gradeNote='Strong result — rate moves worked in your favor and you captured it.';}
  else if(ret>5.2){grade='B+'; gradeNote='Solid outcome, modestly ahead of the starting 5% market rate.';}
  else if(ret>3.8){grade='B-'; gradeNote='Roughly in line with the starting 5% market rate.';}
  else {grade='C'; gradeNote='Rate moves worked against your open positions this session.';}

  const exampleRow = S.ledger[0];
  const gap = exampleRow ? Math.abs(exampleRow.reinvested.annualized*100 - exampleRow.buyYTM) : null;
  const rateMoved = exampleRow ? S.rateHistory.slice(exampleRow.buyRound, exampleRow.sellRound+1).some(r=>Math.abs(r-exampleRow.buyYTM)>0.01) : false;
  const teachNote = exampleRow
    ? `Look at the ${exampleRow.name}: bought at a ${exampleRow.buyYTM.toFixed(2)}% YTM, held ${exampleRow.yearsHeld} year(s). If you reinvested every coupon at the market rate along the way, your annualized return came out to ${pct(exampleRow.reinvested.annualized*100)} — ${gap<0.06 ? "essentially identical to the purchase YTM, exactly as bond math predicts when rates don't move and you hold to maturity." : (rateMoved ? "which differs from the purchase YTM because market rates actually changed while you held it — YTM is only a promise made at the moment of purchase, based on rates as they stood then." : "very close to the purchase YTM.")} But if you just held each coupon as cash instead, your annualized return was only ${pct(exampleRow.cash.annualized*100)}. That gap — ${pct(exampleRow.reinvested.annualized*100 - exampleRow.cash.annualized*100)} points — is reinvestment risk: YTM assumes you can reinvest every coupon at the original rate, and if you don't (or can't), your realized return falls short of the number you thought you locked in.`
    : `You didn't close any positions this session — everything shown is still unrealized. Unrealized gains and losses aren't real until you sell or the bond matures; that's exactly why the distinction matters.`;

  return `
  <div class="center-wrap">
    <div class="brand" style="margin-bottom:20px;"><span class="dot"></span><h1>BOND LAB</h1><span class="sub">Final Results</span></div>

    <div class="gradebox">
      <div style="font-size:48px;font-weight:800;font-family:var(--font-mono);color:${ret>=0?'var(--teal)':'var(--red)'}">${grade}</div>
      <div class="sub">${gradeNote}</div>
    </div>

    <div class="panel">
      <h2>Session Summary</h2>
      <div class="kv"><span class="k">Final Portfolio Value</span><span class="v">$${fmt(val)}</span></div>
      <div class="kv"><span class="k">Total Return (Annualized)</span><span class="v ${ret>=0?'up':'down'}">${pct(ret)}</span></div>
      <div class="kv"><span class="k">Positions Closed (sold or matured)</span><span class="v">${closedCount}</span></div>
      ${avgGapVsYTM!==null ? `<div class="kv"><span class="k">Avg. Realized Return (Reinvested) − Purchase YTM</span><span class="v ${avgGapVsYTM>=0?'up':'down'}">${pct(avgGapVsYTM)} pts</span></div>` : ''}
    </div>

    <div class="panel">
      <h2>Key Takeaway for Discussion</h2>
      <p class="desc" style="margin-bottom:0;">${teachNote}</p>
    </div>

    <div class="panel">
      <h2>Portfolio Value Path</h2>
      ${portfolioChartSVG()}
    </div>

    <div class="panel">
      <h2>Full Realized Return Ledger</h2>
      <div style="overflow-x:auto;">
      <table><thead><tr><th>Bond</th><th>Held</th><th>Buy Price</th><th>Buy YTM</th><th>Exit Price</th><th>Capital Gain</th><th>Coupons (cash)</th><th>HPR Annualized (cash)</th><th>Coupons (reinvested)</th><th>HPR Annualized (reinvested)</th></tr></thead>
        <tbody>${ledgerRows()}</tbody>
      </table>
      </div>
    </div>

    <div class="panel">
      <h2>Discussion Questions</h2>
      <ul class="obj-list">
        <li>For any closed position, does the annualized realized return equal the YTM at purchase? Why or why not?</li>
        <li>Which bond's price moved the most for a given rate change — the 2-year, 5-year, or 8-year? What does that tell you about maturity and price risk?</li>
        <li>Pick a position you're still holding (if any) — how would its "unrealized" return change if rates moved another 1% before you sold?</li>
        <li>If you'd simply bought and held every bond to maturity with no trading, how would your ledger look different?</li>
      </ul>
    </div>

    <button class="btn primary" style="background:var(--panel-raise);color:var(--text);" onclick="S=null;render();">Play Again</button>
  </div>`;
}

function startGame(){
  const cashRaw = document.getElementById('cfgCash').value.replace(/[^0-9.]/g,'');
  const cash = Math.max(1000, parseFloat(cashRaw)||1000);
  const rounds = parseInt(document.getElementById('cfgRounds').value);
  const vol = parseFloat(document.getElementById('cfgVol').value);
  const seed = document.getElementById('cfgSeed').value.trim();
  newGame({cash, rounds, vol, seed});
  render();
}

render();
</script>
</body>
</html>
